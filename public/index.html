<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>local-code-review</title>
  <link rel="stylesheet" href="vendor/prism-theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button
        id="sidebar-toggle-btn"
        type="button"
        aria-label="hide sidebar"
        aria-controls="tree-pane"
        aria-expanded="true"
        title="Toggle sidebar (b)"
      >&#9666;</button>

      <div class="topbar-group">
        <select id="repo-select" aria-label="repo"></select>
        <button id="add-repo-toggle" type="button" title="Add repo">+</button>
      </div>

      <form id="add-repo-form" hidden>
        <input id="add-repo-input" type="text" placeholder="/path/to/repo" autocomplete="off" />
        <button id="add-repo-submit" type="submit">Add</button>
        <button id="add-repo-cancel" type="button">Cancel</button>
        <span id="add-repo-error" class="field-error"></span>
      </form>

      <div class="topbar-group">
        <select id="base-select" aria-label="base ref"></select>
        <span class="ref-sep">&hellip;</span>
        <select id="target-select" aria-label="target ref"></select>
      </div>

      <span id="working-tree-hint" class="hint" hidden>
        Working Tree: diff 會隨你編輯而變、勾會失效，這是正常行為
      </span>

      <div class="topbar-group view-toggle" role="group" aria-label="view mode">
        <button id="view-unified-btn" type="button" class="view-btn">unified</button>
        <button id="view-sidebyside-btn" type="button" class="view-btn">side-by-side</button>
      </div>

      <div class="topbar-group">
        <select id="code-theme-select" aria-label="code color theme" title="Code color theme">
          <option value="default">Claude Code</option>
          <option value="github-dark">GitHub Dark</option>
          <option value="one-dark">One Dark</option>
          <option value="dracula">Dracula</option>
          <option value="monokai">Monokai</option>
          <option value="nord">Nord</option>
          <option value="github-light">GitHub Light</option>
          <option value="solarized-light">Solarized Light</option>
        </select>
      </div>

      <span id="stats-badge" class="stats-badge">0/0</span>
    </header>

    <div id="error-banner" class="error-banner" role="alert" hidden></div>

    <div id="body">
      <nav id="tree-pane" aria-label="change tree">
        <ul id="tree-root" class="tree-root"></ul>
      </nav>
      <main id="main-pane">
        <div id="file-pane-header" class="file-pane-header" hidden></div>
        <div id="changepoints-root"></div>
      </main>
    </div>

    <footer id="shortcut-bar" aria-label="keyboard shortcuts">
      <span class="shortcut"><kbd>j</kbd><kbd>k</kbd> move</span>
      <span class="shortcut"><kbd>x</kbd> mark read</span>
      <span class="shortcut"><kbd>u</kbd> next unread</span>
      <span class="shortcut"><kbd>c</kbd> comment</span>
      <span class="shortcut"><kbd>f</kbd> collapse</span>
      <span class="shortcut"><kbd>b</kbd> sidebar</span>
      <span class="shortcut-help">?</span>
    </footer>
  </div>

  <!-- data-manual: disable Prism's own DOMContentLoaded auto-highlight scan.
       app.js calls Prism.highlight() itself per diff line (see EXTENSION
       POINT 1 in app.js). -->
  <script src="vendor/prism.js" data-manual></script>
  <script type="module" src="app.js"></script>
  <!-- Diagnostic recorder. Loads only when the URL carries ?diag=1, so it is
       inert in normal use. Added to investigate a freeze that could not be
       reproduced under controlled testing; a frozen renderer takes the console
       with it, so this ships each record to the server as it happens. -->
  <script>
    if (new URLSearchParams(location.search).get('diag') === '1') {
      const s = document.createElement('script');
      s.src = 'diag.js';
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
